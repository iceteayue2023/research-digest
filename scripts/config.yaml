# 研究方向简介，会被写进AI的提示词，用来判断文章相关性、写"与你研究的关联"
# 这个描述比关键词列表更重要：AI主要靠理解这段话来打分，写得越具体全面，
# 打分覆盖面越广。以下是核心方向 + 广泛关注的相邻主题。
research_profile: >
  我的核心研究方向是大型食草动物重野化（trophic rewilding / large herbivore rewilding）
  对土壤有机碳（soil organic carbon）及生态系统碳循环的影响，涉及放牧强度、
  植被-土壤反馈、生态系统功能恢复等主题。除此之外我也广泛关注以下相邻领域，
  这些文章即使不直接谈rewilding也请按主题相关性正常给分，不要因为没提rewilding就打低分：
  (1) 陆地生态系统碳循环，包括森林/热带雨林退化与恢复过程中的碳损失与碳获取、
  碳汇碳源变化、极端气候事件对碳循环的扰动；
  (2) 土壤有机质形成与稳定机制，包括颗粒态有机质(POM)与矿物结合态有机质(MAOM)的
  形成路径、土壤微生物群落结构（不仅是多样性）对生态系统功能/初级生产力的影响、
  碳氮磷(C-N-P)化学计量与养分循环，尤其是动物介导的生物地球化学循环
  （zoogeochemistry / animal feedback effects）；
  (3) 植物碳分配策略，例如非结构性碳水化合物(NSC)的储存与利用；
  (4) 食物网复杂性与生物多样性-生态系统功能关系(BEF)；
  (5) 地球系统模式中动态植被模块(DGVM)的开发与验证、生态系统模型改进；
  (6) 我对研究地点在欧洲的文章格外感兴趣（不限具体生态系统类型），如果文章的
  研究地点在欧洲，请在相关性说明里明确指出，并适当提高相关性分数；
  (7) rewilding领域的综述、观点、评论类文章，即使没有新实验数据也应给较高分数，
  因为这类文章能帮我把握领域全局。综述类文章整体上我都偏好给较高分数；
  (8) 生物间互作网络：植物-微生物互作（如叶际microbiome、植物病原体与气候极端
  事件的关系）、植物-动物互作、微生物-动物互作，这些跨界面的互作关系我都感兴趣；
  (9) 捕食者-猎物关系及其性状介导效应（predator-prey interactions, trait-mediated
  effects），尤其是人类活动导致的性状变化如何重塑捕食者-猎物关系；
  (10) 基于自然的解决方案(nature-based solutions)——我关注的角度是它在应对气候变化
  中的作用与局限，包括其潜在的负面效应（如对生物入侵的影响）；
  (11) 特别说明：如果文章发表在 Nature 或 Science 正刊上，只要主题涉及生态学、
  生物多样性(biodiversity)或大型动物(large animals/megafauna)，即使和我的核心课题
  没有直接关系，也请给较高的相关性分数（这两个期刊门槛高，能发表本身就有价值）。


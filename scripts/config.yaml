# 研究方向简介，会被写进AI的提示词，用来判断文章相关性、写"与你研究的关联"
research_profile: >
  我的研究方向是大型食草动物重野化（trophic rewilding / large herbivore rewilding）
  对土壤有机碳（soil organic carbon）及生态系统碳循环的影响，涉及放牧强度、
  植被-土壤反馈、生态系统功能恢复等主题。

# 关键词（不区分大小写，可随时增删）
keywords:
  - rewilding
  - trophic rewilding
  - large herbivore
  - megafauna
  - grazing
  - soil organic carbon
  - soil carbon
  - carbon sequestration
  - carbon cycle
  - carbon cycling
  - trophic cascade
  - ecosystem restoration
  - grassland
  - land use change
  - DGVM
  - biogeochemical cycling
  - zoogeochemistry
  - animal feedback effect
  - nutrient cycling
  - terrestrial ecosystems
  - earth system model
  - ESM
  - extreme weather
  - extreme climate event
  - carbon uptake
  - carbon sink
  - carbon loss


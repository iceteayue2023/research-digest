  - nature.com
  - science.org
  - pnas.org
  - natclimate.nature.com
  - natecoevo.nature.com
  - natsustain.nature.com
  - natgeosci.nature.com
  - natplants.nature.com
  - britishecologicalsociety.org

# 只看最近N天内发布的Bluesky动态
social_max_age_days: 3

# 相关性打分低于这个分数(0-10)的文章不会推送（调低门槛以增加每日推送数量）
relevance_threshold: 4

# 只看最近N天内发布的文章（避免第一次运行时把历年存档全部拉出来）
max_age_days: 7

# 使用的DeepSeek模型（用于摘要与相关性判断，deepseek-chat 性价比高，适合这个场景）
model: deepseek-chat

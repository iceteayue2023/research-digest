name: Daily Research Digest

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run digest script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_digest.py

      - name: Commit and push updated data
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "chore: update daily digest $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
